<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE 貼圖去背神器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #06C755;
  --green-dk: #04a041;
  --bg: #f0f4f0;
  --card: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --radius: 14px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container { max-width: 1120px; margin: 0 auto; padding: 24px 16px 64px; }

header {
  text-align: center;
  padding: 36px 0 28px;
}
header h1 {
  font-size: 1.9rem;
  font-weight: 800;
  background: linear-gradient(135deg, #06C755, #00b0e0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
header p { color: var(--muted); font-size: 0.95rem; }

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 290px 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 760px) {
  .layout { grid-template-columns: 1fr; }
}

/* Controls panel */
.controls {
  background: var(--card);
  border-radius: var(--radius);
  padding: 22px;
  box-shadow: var(--shadow);
  position: sticky;
  top: 16px;
}
.controls-title {
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--green);
}
.ctrl-group { margin-bottom: 18px; }
.ctrl-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 0.875rem;
  font-weight: 600;
  margin-bottom: 7px;
}
.ctrl-label .val { color: var(--green); font-weight: 700; font-variant-numeric: tabular-nums; min-width: 28px; text-align: right; }
.ctrl-hint { display: block; font-size: 0.72rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 5px;
  border-radius: 5px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--green);
  cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: transform .1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

.color-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
input[type=color] {
  width: 44px; height: 36px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  padding: 2px;
  flex-shrink: 0;
}

.toggle-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.875rem;
  font-weight: 600;
}
.toggle {
  position: relative;
  display: inline-block;
  width: 42px; height: 22px;
  flex-shrink: 0;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute;
  inset: 0;
  background: #d1d5db;
  border-radius: 22px;
  transition: .2s;
  cursor: pointer;
}
.slider::before {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle input:checked + .slider { background: var(--green); }
.toggle input:checked + .slider::before { transform: translateX(20px); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  font-size: 0.875rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: .15s;
  text-decoration: none;
}
.btn-primary { background: var(--green); color: #fff; width: 100%; padding: 12px; font-size: 1rem; }
.btn-primary:hover:not(:disabled) { background: var(--green-dk); }
.btn-primary:disabled { background: #d1d5db; cursor: not-allowed; color: #9ca3af; }
.btn-outline {
  background: transparent;
  border: 1.5px solid var(--green);
  color: var(--green);
  padding: 7px 14px;
}
.btn-outline:hover { background: var(--green); color: #fff; }
.btn-sm {
  padding: 5px 11px;
  font-size: 0.78rem;
  border-radius: 7px;
  border: 1.5px solid var(--green);
  background: transparent;
  color: var(--green);
  cursor: pointer;
  font-weight: 600;
  transition: .15s;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--green); color: #fff; }

/* Right side */
.right-side { display: flex; flex-direction: column; gap: 18px; }

/* Upload zone */
.upload-zone {
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 44px 20px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--green); background: #f0fdf4; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 2.8rem; margin-bottom: 10px; }
.upload-zone p { font-weight: 600; margin-bottom: 4px; }
.upload-zone small { color: var(--muted); font-size: 0.78rem; }

/* Toolbar */
.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar-status { font-size: 0.8rem; color: var(--muted); }

/* Preview grid */
.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 14px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .15s;
}
.card:hover { transform: translateY(-2px); }
.card-img {
  position: relative;
  aspect-ratio: 1;
  background: repeating-conic-gradient(#e5e7eb 0% 25%, #f9fafb 0% 50%) 0 0 / 14px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-img canvas, .card-img img {
  max-width: 100%;
  max-height: 160px;
  object-fit: contain;
}
.card-body { padding: 8px 10px; }
.card-name { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
.card-actions { display: flex; gap: 6px; align-items: center; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 600;
}
.badge-wait { background: #f3f4f6; color: #6b7280; }
.badge-proc { background: #fef3c7; color: #92400e; }
.badge-done { background: #d1fae5; color: #065f46; }
.badge-err  { background: #fee2e2; color: #991b1b; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid #fef3c7;
  border-top-color: #d97706;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Tooltip */
.tooltip-wrap { position: relative; display: inline-block; }
.tooltip-wrap .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #1f2937;
  color: #fff;
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .15s;
}
.tooltip-wrap:hover .tip { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>✂️ LINE 貼圖去背神器</h1>
    <p>上傳貼圖圖片，調整參數，一鍵完成去背</p>
  </header>

  <div class="layout">

    <!-- ===== Controls Panel ===== -->
    <aside class="controls">
      <div class="controls-title">⚙️ 參數設定</div>

      <!-- Background Color -->
      <div class="ctrl-group">
        <div class="ctrl-label">背景顏色</div>
        <div class="color-row">
          <input type="color" id="bgColor" value="#ffffff">
          <button class="btn-sm" id="autoDetectBtn">🔍 自動偵測</button>
        </div>
        <span class="ctrl-hint">點「自動偵測」從圖片四角取樣</span>
      </div>

      <div class="divider"></div>

      <!-- Tolerance -->
      <div class="ctrl-group">
        <div class="ctrl-label">
          去背容許值
          <span class="val" id="toleranceVal">30</span>
        </div>
        <input type="range" id="tolerance" min="0" max="100" value="30" step="1">
        <span class="ctrl-hint">數值越高，與背景色相近的像素越容易被去除</span>
      </div>

      <!-- Border Width -->
      <div class="ctrl-group">
        <div class="ctrl-label">
          白邊寬度
          <span class="val" id="borderVal">4</span>&nbsp;px
        </div>
        <input type="range" id="borderWidth" min="0" max="30" value="4" step="1">
        <span class="ctrl-hint">在貼圖主體周圍加入白色描邊外框</span>
      </div>

      <div class="divider"></div>

      <!-- Toggle Options -->
      <div class="toggle-group">
        <div class="toggle-row">
          <span>自動置中</span>
          <label class="toggle">
            <input type="checkbox" id="autoCenter" checked>
            <span class="slider"></span>
          </label>
        </div>
        <span class="ctrl-hint" style="margin-top:-6px">去背後將主體置中於裁切範圍</span>

        <div class="toggle-row">
          <span>強制正方形</span>
          <label class="toggle">
            <input type="checkbox" id="forceSquare">
            <span class="slider"></span>
          </label>
        </div>
        <span class="ctrl-hint" style="margin-top:-6px">輸出為正方形畫布（較長邊對齊）</span>

        <div class="toggle-row">
          <span>去除內部孔洞</span>
          <label class="toggle">
            <input type="checkbox" id="removeHoles" checked>
            <span class="slider"></span>
          </label>
        </div>
        <span class="ctrl-hint" style="margin-top:-6px">填補主體內部被誤去除的透明區域</span>
      </div>

      <div class="divider"></div>

      <button class="btn btn-primary" id="processBtn" disabled>
        ✨ 開始去背
      </button>
    </aside>

    <!-- ===== Right Side ===== -->
    <div class="right-side">

      <!-- Upload Zone -->
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="upload-icon">🖼️</div>
        <p>拖曳圖片到此，或點擊選擇</p>
        <small>支援 JPG、PNG、GIF、WebP &nbsp;·&nbsp; 可一次上傳多張</small>
      </div>

      <!-- Toolbar -->
      <div class="toolbar" id="toolbar" style="display:none">
        <button class="btn btn-outline" id="downloadAllBtn">⬇ 全部下載 (ZIP)</button>
        <button class="btn btn-outline" id="clearBtn" style="border-color:#ef4444;color:#ef4444">🗑 清除全部</button>
        <span class="toolbar-status" id="statusText"></span>
      </div>

      <!-- Preview Grid -->
      <div class="preview-grid" id="previewGrid"></div>

    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────
let loadedFiles = [];
let processedCanvases = [];

// ─── DOM refs ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const toleranceInput = $('tolerance');
const borderInput    = $('borderWidth');
const bgColorInput   = $('bgColor');
const autoCenterCb   = $('autoCenter');
const forceSquareCb  = $('forceSquare');
const removeHolesCb  = $('removeHoles');
const processBtn     = $('processBtn');
const fileInput      = $('fileInput');
const uploadZone     = $('uploadZone');
const previewGrid    = $('previewGrid');
const toolbar        = $('toolbar');
const statusText     = $('statusText');

// ─── UI listeners ─────────────────────────────────────────────────────────────
toleranceInput.addEventListener('input', () => $('toleranceVal').textContent = toleranceInput.value);
borderInput.addEventListener('input',    () => $('borderVal').textContent    = borderInput.value);

fileInput.addEventListener('change', e => { handleFiles(Array.from(e.target.files)); e.target.value = ''; });

uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  handleFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
});

processBtn.addEventListener('click', processAll);

$('autoDetectBtn').addEventListener('click', () => {
  if (!loadedFiles.length) { alert('請先上傳圖片'); return; }
  loadImageElement(loadedFiles[0]).then(img => {
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const { data } = ctx.getImageData(0, 0, img.width, img.height);
    const color = detectBgColor(data, img.width, img.height);
    bgColorInput.value = rgbToHex(...color);
  });
});

$('downloadAllBtn').addEventListener('click', downloadAll);

$('clearBtn').addEventListener('click', () => {
  if (!confirm('確定要清除所有圖片嗎？')) return;
  loadedFiles = [];
  processedCanvases = [];
  previewGrid.innerHTML = '';
  toolbar.style.display = 'none';
  processBtn.disabled = true;
  statusText.textContent = '';
});

// ─── File handling ────────────────────────────────────────────────────────────
function handleFiles(files) {
  if (!files.length) return;
  files.forEach((file, i) => {
    const idx = loadedFiles.length;
    loadedFiles.push(file);
    processedCanvases.push(null);
    addCard(file, idx);
  });
  toolbar.style.display = 'flex';
  processBtn.disabled = false;
  updateStatus();
}

function addCard(file, idx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${idx}`;
  card.innerHTML = `
    <div class="card-img" id="cimg-${idx}">
      <span style="color:#d1d5db;font-size:0.75rem">待處理</span>
    </div>
    <div class="card-body">
      <div class="card-name" id="cname-${idx}" title="${file.name}">${file.name}</div>
      <div class="card-actions" id="cact-${idx}">
        <span class="badge badge-wait">⏳ 未處理</span>
      </div>
    </div>`;
  previewGrid.appendChild(card);

  // Show original preview
  loadImageElement(file).then(img => {
    const c = thumbCanvas(img, 160);
    const el = $(`cimg-${idx}`);
    el.innerHTML = '';
    el.appendChild(c);
  });
}

function thumbCanvas(img, maxSize) {
  const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
  const c = document.createElement('canvas');
  c.width  = Math.round(img.width  * scale);
  c.height = Math.round(img.height * scale);
  c.style.maxWidth = '100%';
  c.style.maxHeight = maxSize + 'px';
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  return c;
}

function updateStatus() {
  const done = processedCanvases.filter(Boolean).length;
  statusText.textContent = `${done} / ${loadedFiles.length} 已完成`;
}

// ─── Batch processing ─────────────────────────────────────────────────────────
async function processAll() {
  processBtn.disabled = true;
  processBtn.textContent = '⚙️ 處理中…';

  const params = getParams();

  for (let i = 0; i < loadedFiles.length; i++) {
    setCardStatus(i, 'proc');
    try {
      const img = await loadImageElement(loadedFiles[i]);
      const result = processImageElement(img, params);
      processedCanvases[i] = result;
      setCardDone(i, result, loadedFiles[i].name);
    } catch (err) {
      console.error(err);
      setCardStatus(i, 'err');
    }
  }

  processBtn.disabled = false;
  processBtn.textContent = '✨ 開始去背';
  updateStatus();
}

function getParams() {
  return {
    tolerance:   parseInt(toleranceInput.value),
    borderWidth: parseInt(borderInput.value),
    autoCenter:  autoCenterCb.checked,
    forceSquare: forceSquareCb.checked,
    removeHoles: removeHolesCb.checked,
    bgColorHex:  bgColorInput.value,
  };
}

function setCardStatus(idx, type) {
  const labels = { proc: '<span class="spinner"></span> 處理中', err: '❌ 失敗', done: '✅ 完成' };
  const classes = { proc: 'badge-proc', err: 'badge-err', done: 'badge-done' };
  $(`cact-${idx}`).innerHTML = `<span class="badge ${classes[type]}">${labels[type]}</span>`;
}

function setCardDone(idx, canvas, filename) {
  const el = $(`cimg-${idx}`);
  el.innerHTML = '';
  el.appendChild(thumbCanvas({ width: canvas.width, height: canvas.height,
    _src: canvas }, 160));

  // draw thumb properly
  const thumb = thumbCanvas2(canvas, 160);
  el.innerHTML = '';
  el.appendChild(thumb);

  const baseName = filename.replace(/\.[^/.]+$/, '') + '_rmbg.png';
  $(`cname-${idx}`).textContent = `${canvas.width}×${canvas.height} px`;
  $(`cact-${idx}`).innerHTML = `
    <span class="badge badge-done">✅ 完成</span>
    <button class="btn-sm" onclick="downloadSingle(${idx},'${CSS.escape(baseName)}')">⬇</button>`;
}

function thumbCanvas2(srcCanvas, maxSize) {
  const scale = Math.min(maxSize / srcCanvas.width, maxSize / srcCanvas.height, 1);
  const c = document.createElement('canvas');
  c.width  = Math.round(srcCanvas.width  * scale);
  c.height = Math.round(srcCanvas.height * scale);
  c.style.maxWidth = '100%';
  c.style.maxHeight = maxSize + 'px';
  c.getContext('2d').drawImage(srcCanvas, 0, 0, c.width, c.height);
  return c;
}

function downloadSingle(idx, filename) {
  const canvas = processedCanvases[idx];
  if (!canvas) return;
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

async function downloadAll() {
  if (!processedCanvases.some(Boolean)) { alert('請先處理圖片'); return; }
  const btn = $('downloadAllBtn');
  btn.disabled = true;
  btn.textContent = '打包中…';

  const zip = new JSZip();
  await Promise.all(processedCanvases.map((canvas, i) => {
    if (!canvas) return null;
    const name = loadedFiles[i].name.replace(/\.[^/.]+$/, '') + '_rmbg.png';
    return new Promise(res => canvas.toBlob(blob => { zip.file(name, blob); res(); }, 'image/png'));
  }).filter(Boolean));

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stickers_rmbg.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);

  btn.disabled = false;
  btn.textContent = '⬇ 全部下載 (ZIP)';
}

// ─── Core Processing ──────────────────────────────────────────────────────────

function loadImageElement(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src = url;
  });
}

function processImageElement(img, params) {
  const { tolerance, borderWidth, autoCenter, forceSquare, removeHoles, bgColorHex } = params;

  // Draw source to canvas
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width = img.width; srcCanvas.height = img.height;
  const srcCtx = srcCanvas.getContext('2d');
  srcCtx.drawImage(img, 0, 0);

  const imageData = srcCtx.getImageData(0, 0, img.width, img.height);
  const { data, width, height } = imageData;

  // Background color
  const bgColor = hexToRgb(bgColorHex) || detectBgColor(data, width, height);

  // Tolerance → Euclidean distance threshold (max distance √(3·255²) ≈ 441.67)
  const threshold = (tolerance / 100) * 441.67;

  // Step 1: flood fill background from all 4 borders
  const removeMap = floodFillBg(data, width, height, bgColor, threshold);

  // Step 2: restore internal holes (transparent regions enclosed by opaque pixels)
  if (removeHoles) fillHoles(removeMap, width, height);

  // Step 3: apply mask → transparent
  const px = new Uint8ClampedArray(data);
  for (let i = 0; i < width * height; i++) {
    if (removeMap[i]) px[i * 4 + 3] = 0;
  }

  // Step 4: bounding box of remaining opaque content
  const bbox = getBBox(px, width, height);
  if (!bbox) {
    const empty = document.createElement('canvas');
    empty.width = empty.height = 100;
    return empty;
  }

  // Step 5: content canvas dimensions (optionally square)
  let cW = bbox.w;
  let cH = bbox.h;
  if (forceSquare) cW = cH = Math.max(cW, cH);

  // Step 6: centering offset within content canvas
  const offX = (autoCenter || forceSquare) ? Math.floor((cW - bbox.w) / 2) : 0;
  const offY = (autoCenter || forceSquare) ? Math.floor((cH - bbox.h) / 2) : 0;

  // Step 7: draw trimmed content onto content canvas
  const trimCanvas = document.createElement('canvas');
  trimCanvas.width = cW; trimCanvas.height = cH;
  const trimCtx = trimCanvas.getContext('2d');

  const maskedCanvas = document.createElement('canvas');
  maskedCanvas.width = width; maskedCanvas.height = height;
  maskedCanvas.getContext('2d').putImageData(new ImageData(px, width, height), 0, 0);

  trimCtx.drawImage(maskedCanvas, bbox.x, bbox.y, bbox.w, bbox.h, offX, offY, bbox.w, bbox.h);

  // Step 8: final canvas = content + white border padding
  const outW = cW + borderWidth * 2;
  const outH = cH + borderWidth * 2;
  const outCanvas = document.createElement('canvas');
  outCanvas.width = outW; outCanvas.height = outH;
  const outCtx = outCanvas.getContext('2d');

  // Step 9: white outline via morphological dilation of alpha channel
  if (borderWidth > 0) {
    const trimData = trimCtx.getImageData(0, 0, cW, cH).data;
    const srcAlpha = new Uint8Array(cW * cH);
    for (let i = 0; i < cW * cH; i++) srcAlpha[i] = trimData[i * 4 + 3];

    // Embed into expanded canvas with border padding
    const expAlpha = new Uint8Array(outW * outH);
    for (let y = 0; y < cH; y++)
      for (let x = 0; x < cW; x++)
        expAlpha[(y + borderWidth) * outW + (x + borderWidth)] = srcAlpha[y * cW + x];

    // 2-pass separable max filter (square dilation)
    const dilated = dilateAlpha(expAlpha, outW, outH, borderWidth);

    // Paint white outline
    const whiteData = outCtx.createImageData(outW, outH);
    const wd = whiteData.data;
    for (let i = 0; i < outW * outH; i++) {
      if (dilated[i] > 10) {
        wd[i*4]=wd[i*4+1]=wd[i*4+2]=255;
        wd[i*4+3] = dilated[i];
      }
    }
    outCtx.putImageData(whiteData, 0, 0);
  }

  // Step 10: draw content on top of white outline
  outCtx.drawImage(trimCanvas, borderWidth, borderWidth);

  return outCanvas;
}

// ─── Algorithms ───────────────────────────────────────────────────────────────

function detectBgColor(data, width, height) {
  const sz = 8;
  const samples = [];
  const corners = [
    [0, 0],
    [Math.max(0, width - sz), 0],
    [0, Math.max(0, height - sz)],
    [Math.max(0, width - sz), Math.max(0, height - sz)],
  ];
  for (const [cx, cy] of corners) {
    for (let dy = 0; dy < sz && cy + dy < height; dy++)
      for (let dx = 0; dx < sz && cx + dx < width; dx++) {
        const i = ((cy + dy) * width + (cx + dx)) * 4;
        samples.push([data[i], data[i+1], data[i+2]]);
      }
  }
  if (!samples.length) return [255, 255, 255];
  const sorted = ch => samples.map(s => s[ch]).sort((a,b) => a-b);
  const mid = Math.floor(samples.length / 2);
  return [sorted(0)[mid], sorted(1)[mid], sorted(2)[mid]];
}

function floodFillBg(data, width, height, bgColor, threshold) {
  const remove  = new Uint8Array(width * height);
  const visited = new Uint8Array(width * height);
  const queue   = new Int32Array(width * height);
  let qH = 0, qT = 0;
  const [br, bg, bb] = bgColor;

  function dist(idx) {
    const i = idx * 4;
    const dr = data[i]   - br;
    const dg = data[i+1] - bg;
    const db = data[i+2] - bb;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  function tryAdd(x, y) {
    if (x < 0 || x >= width || y < 0 || y >= height) return;
    const idx = y * width + x;
    if (visited[idx]) return;
    visited[idx] = 1;
    if (dist(idx) <= threshold) { remove[idx] = 1; queue[qT++] = idx; }
  }

  for (let x = 0; x < width;  x++) { tryAdd(x, 0); tryAdd(x, height-1); }
  for (let y = 1; y < height-1; y++) { tryAdd(0, y); tryAdd(width-1, y); }

  while (qH < qT) {
    const idx = queue[qH++];
    const x = idx % width, y = (idx - x) / width;
    tryAdd(x-1, y); tryAdd(x+1, y); tryAdd(x, y-1); tryAdd(x, y+1);
  }
  return remove;
}

function fillHoles(removeMap, width, height) {
  // Flood fill from border transparent pixels to find "external" transparency.
  // Internal transparent pixels (holes) → restore to opaque.
  const external = new Uint8Array(width * height);
  const queue    = new Int32Array(width * height);
  let qH = 0, qT = 0;

  function tryAdd(x, y) {
    if (x < 0 || x >= width || y < 0 || y >= height) return;
    const idx = y * width + x;
    if (external[idx] || !removeMap[idx]) return;
    external[idx] = 1;
    queue[qT++] = idx;
  }

  for (let x = 0; x < width;  x++) { tryAdd(x, 0); tryAdd(x, height-1); }
  for (let y = 1; y < height-1; y++) { tryAdd(0, y); tryAdd(width-1, y); }

  while (qH < qT) {
    const idx = queue[qH++];
    const x = idx % width, y = (idx - x) / width;
    tryAdd(x-1, y); tryAdd(x+1, y); tryAdd(x, y-1); tryAdd(x, y+1);
  }

  // Internal holes: marked for removal but not connected to external transparent
  for (let i = 0; i < width * height; i++)
    if (removeMap[i] && !external[i]) removeMap[i] = 0;
}

function getBBox(data, width, height) {
  let minX = width, minY = height, maxX = -1, maxY = -1;
  for (let y = 0; y < height; y++)
    for (let x = 0; x < width; x++)
      if (data[(y * width + x) * 4 + 3] > 10) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
  if (maxX < 0) return null;
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function dilateAlpha(alpha, width, height, radius) {
  // Horizontal max-filter pass
  const hPass = new Uint8Array(width * height);
  for (let y = 0; y < height; y++) {
    const row = y * width;
    for (let x = 0; x < width; x++) {
      let max = 0;
      const x0 = Math.max(0, x - radius), x1 = Math.min(width - 1, x + radius);
      for (let nx = x0; nx <= x1; nx++) {
        const v = alpha[row + nx];
        if (v > max) { max = v; if (max === 255) break; }
      }
      hPass[row + x] = max;
    }
  }
  // Vertical max-filter pass
  const result = new Uint8Array(width * height);
  for (let x = 0; x < width; x++) {
    for (let y = 0; y < height; y++) {
      let max = 0;
      const y0 = Math.max(0, y - radius), y1 = Math.min(height - 1, y + radius);
      for (let ny = y0; ny <= y1; ny++) {
        const v = hPass[ny * width + x];
        if (v > max) { max = v; if (max === 255) break; }
      }
      result[y * width + x] = max;
    }
  }
  return result;
}

// ─── Utilities ────────────────────────────────────────────────────────────────

function hexToRgb(hex) {
  if (!hex || hex.length < 7) return null;
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
